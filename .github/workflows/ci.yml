name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: demo/pom.xml

      - name: Compile
        run: ./mvnw compile -q

      - name: Test
        run: ./mvnw test -q
        env:
          DB_URL: jdbc:h2:mem:testdb
          DB_USERNAME: sa
          DB_PASSWORD:
          JWT_SECRET: test-secret-key-for-ci-must-be-at-least-256-bits

      - name: Package
        run: ./mvnw package -DskipTests -q

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: car-service-jar
          path: demo/target/*.jar
          retention-days: 30

