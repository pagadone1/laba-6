# TLS профиль — активировать: spring.profiles.active=tls
# Переменные: SSL_KEY_STORE, SSL_KEY_STORE_PASSWORD, SSL_KEY_ALIAS (опционально)

server.port=8443
server.ssl.key-store=${SSL_KEY_STORE}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:carservice-server}
