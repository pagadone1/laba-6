server.port=8080

# Database - use environment variables for sensitive data
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/carservice}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Load data.sql after Hibernate creates schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-signing-must-be-long-enough}
jwt.access.expiration-ms=900000
jwt.refresh.expiration-ms=86400000
